name: Jobra job ingestion

# Runs every hour to keep the feed fresh.
# Free on public repos (unlimited minutes); ~1,440 min/mo on private (within the 2,000 free).
# Also keeps the Supabase free project from auto-pausing after 7 days idle.

on:
  schedule:
    - cron: "0 * * * *"      # top of every hour (UTC)
  workflow_dispatch:          # lets you trigger a run manually from the Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        working-directory: ingest
        run: npm install

      - name: Run ingestion
        working-directory: ingest
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADZUNA_APP_ID:             ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:            ${{ secrets.ADZUNA_APP_KEY }}
        run: node ingest-adzuna.mjs
